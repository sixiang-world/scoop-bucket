# ── 自动更新 warp-cn manifest ──────────────────────────
# 定时检查 Heartcoolman/warp-cn 的最新 Release，
# 有新版本时自动更新 bucket/warp-cn.json 并推送。
#
# 触发方式: 每 6 小时检查一次 + 支持手动触发
# ──────────────────────────────────────────────────────

name: Auto-Update warp-cn

on:
  schedule:
    # 每天 02:00, 08:00, 14:00, 20:00 UTC (对应北京时间 10/16/22/04)
    - cron: "0 2,8,14,20 * * *"
  workflow_dispatch: # 支持手动触发
    inputs:
      force:
        description: "强制更新（即使版本相同）"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update-warp-cn:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 需要完整历史以判断文件是否真的变更
          fetch-depth: 0

      - name: Run update script
        id: update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/update-warp-cn.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet bucket/warp-cn.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push update
        if: steps.diff.outputs.changed == 'true'
        run: |
          NEW_VER=$(python3 -c "import json; print(json.load(open('bucket/warp-cn.json'))['version'])")
          git config user.name "scoop-bot"
          git config user.email "scoop-bot@users.noreply.github.com"
          git add bucket/warp-cn.json
          git commit -m "chore(warp-cn): bump to ${NEW_VER}

          Auto-detected new release from Heartcoolman/warp-cn"
          git push
